<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supersourcing Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="icon" href="data:,">
</head>
<body>
  <div class="app-container">
    <header class="header">
      <div class="logo-container">
        <img src="https://supersourcing.com/common/img/logo-dark.svg" alt="Supersourcing Logo">
      </div>
      <div class="header-actions">
        <div class="status-badge">
          <div class="status-dot"></div>
          <span>AI Assistant Online</span>
        </div>
        <button id="clearBtn" class="clear-btn" title="Clear Chat History">
          <svg viewBox="0 0 24 24" width="18" height="18">
            <path d="M16 9v10H8V9h8m-1.5-6h-5l-1 1H5v2h14V4h-3.5l-1-1zM18 7H6v12c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7z" fill="currentColor"></path>
          </svg>
          <span class="btn-text">Clear</span>
        </button>
      </div>
    </header>

    <div id="chatbox">
      <!-- Messages will appear here -->
    </div>

    <div class="input-container">
      <div class="input-wrapper">
        <input type="text" id="message" placeholder="Ask about jobs, clients, or trends..." autocomplete="off" />
        <button id="sendBtn">
          <svg viewBox="0 0 24 24">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    const chatbox = document.getElementById("chatbox");
    const input = document.getElementById("message");
    const sendBtn = document.getElementById("sendBtn");
    const clearBtn = document.getElementById("clearBtn");
    let history = [];

    function formatText(text) {
      if (!text) return "";
      
      let cleanText = text || "";
      
      // 1. Remove markdown code blocks if the AI accidentally wraps the HTML
      cleanText = cleanText.replace(/^```html\s*([\s\S]*?)\s*```$/gm, '$1');
      cleanText = cleanText.replace(/^```\s*([\s\S]*?)\s*```$/gm, '$1');

      // 2. Remove full HTML document boilerplate if AI provides it
      cleanText = cleanText.replace(/<!DOCTYPE[\s\S]*?>/gi, "");
      cleanText = cleanText.replace(/<html[\s\S]*?>/gi, "");
      cleanText = cleanText.replace(/<\/html>/gi, "");
      cleanText = cleanText.replace(/<head>[\s\S]*?<\/head>/gi, "");
      cleanText = cleanText.replace(/<body[\s\S]*?>/gi, "");
      cleanText = cleanText.replace(/<\/body>/gi, "");

      let rendered = marked.parse(cleanText.trim(), {
        breaks: true,
        gfm: true
      });

      // 3. Wrap tables in responsive container
      if (/<table/i.test(rendered)) {
        rendered = rendered.replace(/<table/g, '<div class="table-wrapper"><table');
        rendered = rendered.replace(/<\/table>/g, '</table></div>');
      }

      return rendered;
    }

    function addMessage(role, content) {
      const row = document.createElement("div");
      row.className = `msg ${role}`;
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.innerHTML = formatText(content);
      row.appendChild(bubble);
      chatbox.appendChild(row);
      scrollToBottom();
      
      // Update internal history for context
      history.push({ role, content });
      if (history.length > 20) history.shift(); // Keep context healthy

      // Persist to local storage (last 10 messages only as requested)
      saveToStorage();
      renderCharts(row);
    }

    function saveToStorage() {
      const messages = Array.from(chatbox.querySelectorAll('.msg:not(.typing-container)')).map(msg => {
        return {
          role: msg.classList.contains('user') ? 'user' : 'bot',
          content: msg.querySelector('.bubble').innerHTML, // Keep the rendered HTML for fast load
          isRaw: false
        };
      }).slice(-10); // Keep last 10
      localStorage.setItem('chat_history', JSON.stringify(messages));
    }

    function loadFromStorage() {
      const saved = localStorage.getItem('chat_history');
      if (saved) {
        const messages = JSON.parse(saved);
        chatbox.innerHTML = '';
        messages.forEach(msg => {
          const row = document.createElement("div");
          row.className = `msg ${msg.role}`;
          const bubble = document.createElement("div");
          bubble.className = "bubble";
          bubble.innerHTML = msg.content;
          row.appendChild(bubble);
          chatbox.appendChild(row);

          // Restore history array for Claude context
          history.push({ role: msg.role, content: msg.role === 'user' ? msg.content : "(Previous response)" });
          renderCharts(row);
        });
        scrollToBottom();
        return true;
      }
      return false;
    }

    function clearHistory() {
      localStorage.removeItem('chat_history');
      chatbox.innerHTML = '';
      history = [];
      addMessage("bot", "History cleared. How can I help you today?");
    }

    clearBtn.addEventListener('click', clearHistory);

    function renderCharts(container) {
      const charts = container.querySelectorAll(".chat-chart");
      charts.forEach(canvas => {
        try {
          const type = canvas.getAttribute("data-type") || "bar";
          const labels = JSON.parse(canvas.getAttribute("data-labels") || "[]");
          const values = JSON.parse(canvas.getAttribute("data-values") || "[]");
          const label = canvas.getAttribute("data-label") || "Count";
          
          new Chart(canvas, {
            type: type,
            data: {
              labels: labels,
              datasets: [{
                label: label,
                data: values,
                backgroundColor: 'rgba(0, 102, 255, 0.2)',
                borderColor: 'rgba(0, 102, 255, 1)',
                borderWidth: 1,
                borderRadius: 4
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: { display: type === 'pie' || type === 'doughnut' }
              },
              scales: type === 'bar' || type === 'line' ? {
                y: { beginAtZero: true, grid: { display: false } },
                x: { grid: { display: false } }
              } : {}
            }
          });
        } catch (e) {
          console.error("Chart rendering failed:", e);
        }
      });
    }


    function showTyping() {
      const row = document.createElement("div");
      row.className = "msg bot typing-container";
      const bubble = document.createElement("div");
      bubble.className = "bubble typing-indicator";
      bubble.innerHTML = `
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      `;
      row.appendChild(bubble);
      chatbox.appendChild(row);
      scrollToBottom();
      return row;
    }

    function scrollToBottom() {
      chatbox.scrollTop = chatbox.scrollHeight;
    }

    // Restore history or show initial greeting
    if (!loadFromStorage()) {
      setTimeout(() => {
        addMessage("bot", "Namaste! I'm your Supersourcing assistant. How can I help you today? You can ask about available jobs or client details.");
      }, 500);
    }

    async function sendMessage() {
      const message = input.value.trim();
      if (!message) return;

      // Add user message
      addMessage("user", message);
      input.value = "";
      sendBtn.disabled = true;

      // Add typing indicator
      const typingIndicator = showTyping();

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message, history })
        });

        const data = await res.json().catch(() => ({}));
        
        // Remove typing indicator and add response
        typingIndicator.remove();
        
        const reply = data.reply || "I encountered an unexpected response. Please try again.";
        addMessage("bot", reply);

      } catch (error) {
        typingIndicator.remove();
        addMessage("bot", "I'm having trouble connecting to the server. Please check your connection.");
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }

    sendBtn.addEventListener("click", sendMessage);
    input.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        sendMessage();
      }
    });

    // Clickable Suggestions Handler
    document.addEventListener("click", (event) => {
      if (event.target.classList.contains("suggestion-btn")) {
        const query = event.target.getAttribute("data-query");
        if (query) {
          input.value = query;
          sendMessage();
        }
      }
    });

    // Auto-focus input on load
    input.focus();
  </script>
</body>
</html>
